# 行业生态位映射（Industry Mapping）
# 用于自动判断标的属于哪个同心圆，以及四维信号该用哪套口径

eco_circles:
  core_resource:
    label: "核心资源（A类本体）"
    description: "煤/钢/有色/化工等高弹性大宗，直接囤积底层生产资料"
    industries:
      - 煤炭
      - 煤炭开采
      - 煤炭行业
      - 煤化工
      - 焦煤焦炭
      - 钢铁
      - 铁矿石
      - 铜铝锌
      - 稀土
      - 锂
      - 纯碱
      - 氯碱
      - 钛白粉
      - 磷化工
      - 氟化工
      - 石油天然气
      - 黄金
      - 化学原料
      - 化工原料
      - 基础化工
      - 小金属
      - 能源金属
      - 贵金属
      - 有色金属
      - 采掘
    four_signal_mode: resource_body
    four_signals:
      core:
        - spot_futures_price
        - industry_inventory
      auxiliary:
        - cost_curve_supply
        - pb_valuation

  rigid_shovel:
    label: "刚性配套（C类铲子）"
    description: "民爆/工程机械/港口/造船等垄断铲子，吃别人的Capex"
    industries:
      - 民爆
      - 工程机械
      - 港口
      - 造船
      - 矿山设备
      - 油服
      - 核电设备
      - 特种钢
      - 船舶制造
      - 航运港口
      - 专用设备
    four_signal_mode: shovel_play
    four_signals:
      core:
        - downstream_spot
        - downstream_capex
      auxiliary:
        - orders_backlog
        - pb_valuation
    mandatory_evidence:
      - downstream_capex

  core_military:
    label: "核心军工"
    description: "军工核心供应商，需满足特殊准入门槛"
    industries:
      - 航空发动机
      - 军工电子
      - 导弹武器
      - 核工业
      - 军用特材
      - 航天航空
      - 国防军工
    four_signal_mode: military
    four_signals:
      core:
        - defense_budget
        - order_visibility
      auxiliary:
        - capacity_utilization
        - pb_valuation

# 越界红牌
out_of_bounds:
  label: "越界标的"
  action: "RED_CARD"
  examples:
    - 消费
    - 医药
    - 互联网
    - 金融
    - 房地产
    - 传媒
    - 教育
    - 食品饮料
    - 酿酒
    - 软件
    - 计算机
    - 电子
    - 通信
    - 保险
    - 银行
    - 证券

