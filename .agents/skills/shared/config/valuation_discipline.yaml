opportunity_types:
  compounder:
    label: "Compounder"
    methods:
      floor_case: owner_earnings_no_growth
      normalized_case: owner_earnings_fair_multiple
      recognition_case: premium_quality_multiple
    case_multiples:
      floor: 12
      normalized: 18
      recognition: 24
    multiples:
      bear: 12
      base: 18
      bull: 24
      floor: 12
      normalized: 18
      recognition: 24
    growth_assumptions:
      bear: "flat earnings, no rerating"
      base: "mid-single-digit growth with stable returns"
      bull: "double-digit growth with premium durability"
  cyclical:
    label: "Cyclical"
    methods:
      floor_case: tangible_book_or_replacement_cost
      normalized_case: mid_cycle_earnings
      recognition_case: rerated_mid_cycle_earnings
    case_multiples:
      floor: 0.85
      normalized: 9
      recognition: 12
    multiples:
      bear: 6
      base: 9
      bull: 12
      floor: 0.85
      normalized: 9
      recognition: 12
    normalized_haircuts:
      bear: 0.75
      base: 1.00
      bull: 1.20
  turnaround:
    label: "Turnaround"
    methods:
      floor_case: survival_value
      normalized_case: repaired_earnings
      recognition_case: post_repair_rerating
    case_multiples:
      floor_book: 0.7
      normalized_pe: 10
      recognition_pe: 14
    balance_sheet_haircuts:
      bear: 0.55
      base: 0.80
      bull: 1.00
      floor: 0.70
    recovery_multiples:
      bear: 8
      base: 12
      bull: 16
      normalized: 10
      recognition: 14
  asset_play:
    label: "Asset play"
    methods:
      floor_case: stressed_nav
      normalized_case: book_or_nav
      recognition_case: discount_close
    case_multiples:
      floor: 0.8
      normalized: 1.0
      recognition: 1.2
    book_multiples:
      bear: 0.70
      base: 1.00
      bull: 1.25
      floor: 0.80
      normalized: 1.00
      recognition: 1.20
  special_situation:
    label: "Special situation"
    methods:
      floor_case: downside_case_weighted
      normalized_case: base_case_weighted
      recognition_case: upside_case_weighted
    outcome_multiples:
      bear: 0.85
      base: 1.10
      bull: 1.35
    probabilities:
      bear: 0.35
      base: 0.60
      bull: 0.80
      downside: 0.40
      upside: 0.80

state_thresholds:
  cold_storage_min_floor_protection: 0.85
  cold_storage_min_normalized_upside: 0.40
  ready_min_normalized_upside: 0.25
  attack_min_recognition_upside: 0.20

compatibility_defaults:
  position_state_thresholds:
    min_floor_protection_for_seed: 0.85
    min_normalized_upside_for_seed: 0.40
    min_normalized_upside_for_attack: 0.25
    min_recognition_upside_for_attack: 0.20
  flow_stage_order:
    abandoned: 0
    latent: 1
    ignition: 2
    trend: 3
    crowded: 4
  bottom_signal:
    deep_value_pb: 0.9
    fair_value_pb: 1.4
    low_position_vs_high: 55
    caution_vs_high: 70
  price_trigger:
    rebound_from_60d_low_pct: 0.08
    above_avg20_pct: 0.02
    return_20d_pct: 0.05

route_methods:
  core_resource:
    normalized_anchor: core_resource_mid_cycle
  rigid_shovel:
    normalized_anchor: rigid_shovel_capex_mid_cycle
  core_military:
    normalized_anchor: core_military_margin_anchor
  consumer:
    normalized_anchor: consumer_owner_earnings_anchor
  tech:
    normalized_anchor: tech_owner_earnings_anchor
  financial_asset:
    normalized_anchor: financial_asset_mid_cycle_roe
  unknown:
    normalized_anchor: conservative_fallback

route_case_overrides:
  default:
    floor:
      valuation_method: conservative_book
      assumption: book-value fallback
      preferred_anchor: equity
      equity_multiple: 0.75
      profit_multiple: 8
    normalized:
      assumption: conservative normalized earnings
      preferred_anchor: profit
      profit_multiple: 8
      equity_multiple: 0.90
    recognition:
      valuation_method: recognition_multiple
      assumption: sentiment-driven upside
      preferred_anchor: normalized
      normalized_multiple: 1.25
      profit_multiple:
  core_resource:
    floor:
      valuation_method: stressed_book
      assumption: commodity stress persists
      preferred_anchor: equity
      equity_multiple: 0.85
    normalized:
      assumption: mid-cycle resource earnings
      preferred_anchor: profit
      profit_multiple: 9
      equity_multiple: 1.00
    recognition:
      valuation_method: peak_cycle_multiple
      assumption: pricing and sentiment overshoot
      preferred_anchor: profit
      profit_multiple: 12
      normalized_multiple: 1.25
  rigid_shovel:
    floor:
      valuation_method: replacement_cost_proxy
      assumption: capex remains soft
      preferred_anchor: equity
      equity_multiple: 0.80
    normalized:
      assumption: mid-cycle capex demand
      preferred_anchor: profit
      profit_multiple: 10
      equity_multiple: 1.05
    recognition:
      valuation_method: peak_capex_multiple
      assumption: order boom and rerating
      preferred_anchor: profit
      profit_multiple: 13
      normalized_multiple: 1.25
  core_military:
    normalized:
      assumption: program margins normalize
      preferred_anchor: profit
      profit_multiple: 16
      equity_multiple: 1.20
    recognition:
      valuation_method: recognition_multiple
      assumption: program certainty premium
      preferred_anchor: profit
      profit_multiple: 20
      normalized_multiple: 1.35
  consumer:
    floor:
      valuation_method: no_growth_owner_earnings
      assumption: no-growth downside anchor
      preferred_anchor: profit
      profit_multiple: 8
      equity_multiple: 0.75
    normalized:
      assumption: owner earnings normalize
      preferred_anchor: profit
      profit_multiple: 15
      equity_multiple: 1.30
    recognition:
      valuation_method: recognition_multiple
      assumption: quality rerating and momentum
      preferred_anchor: normalized
      normalized_multiple: 1.35
      profit_multiple: 20
  tech:
    floor:
      valuation_method: no_growth_owner_earnings
      assumption: no-growth downside anchor
      preferred_anchor: profit
      profit_multiple: 8
      equity_multiple: 0.75
    normalized:
      assumption: demand and mix normalize
      preferred_anchor: profit
      profit_multiple: 18
      equity_multiple: 1.40
    recognition:
      valuation_method: recognition_multiple
      assumption: quality rerating and momentum
      preferred_anchor: normalized
      normalized_multiple: 1.35
      profit_multiple: 20
  financial_asset:
    floor:
      valuation_method: stressed_nav
      assumption: asset discount persists
      preferred_anchor: equity
      equity_multiple: 0.90
    normalized:
      assumption: mid-cycle ROE on current equity
      preferred_anchor: equity
      equity_multiple: 1.10
    recognition:
      valuation_method: recognition_multiple
      assumption: discount closes
      preferred_anchor: normalized
      normalized_multiple: 1.20

score_bands:
  floor_protection:
    - threshold: 0.60
      score: 20
    - threshold: 0.75
      score: 45
    - threshold: 0.85
      score: 65
    - threshold: 1.00
      score: 85
    - threshold: 1.20
      score: 100
  normalized_value_ratio:
    - threshold: 0.80
      score: 30
    - threshold: 1.00
      score: 50
    - threshold: 1.20
      score: 65
    - threshold: 1.50
      score: 85
    - threshold: 2.00
      score: 100
